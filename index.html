const MAX_SUN_SLOWDOWN_AT_ROGUE_POINTS = 200;

function sunEconomySlowFactor(state) {
  const steppedPoints = Math.min(MAX_SUN_SLOWDOWN_AT_ROGUE_POINTS, Math.floor((state.roguePoints || 0) / 10) * 10);
  return 1 + 2 * (steppedPoints / MAX_SUN_SLOWDOWN_AT_ROGUE_POINTS);
}

function currentSkySunInterval(state) {
  return (SKY_SUN_INTERVAL * sunEconomySlowFactor(state)) / Math.max(0.01, state.skySunRate || 1);
}

function rarityForBuff(name) {
  const epic = new Set(["Split Peas", "Solar Flare", "Tall-but-skinny Nut", "Staggering Wall", "Toxic Burp", "Cluster Bomb", "Buried Roots", "Needle Storm", "Splash Cabbage", "Fourteen-Armed Choynado"]);
  const rare = new Set(["Piercing Peas", "Frozen Peas", "Twinflower", "Golden Petals", "Rogue Petals", "Spiky Shell", "Nut Repair", "Towering", "Auto Patch", "Long Tongue", "Spare Teeth", "Backbite Vines", "Bigger Boom", "Afterburn", "Sticky Spikes", "Tire Popper", "Balloon Hunter", "Piercing Needles", "Stunning Slaw", "Rotten Cabbage", "Siege Cabbage", "Mower Workshop", "Lucky Packet", "Root Network", "Battlefield Salvage", "Last Stand", "Bomb School", "Cross Counter", "Spinach Surge"]);
  const uncommon = new Set(["Bigger Peas", "Quick Sprouts", "Overgrowth", "Fast Bloom", "Sunburst", "Emergency Photosynthesis", "Hard Shell", "Panic Shell", "Stone Nut", "Air Stopper", "Iron Crown", "Hungry", "Big Mouth", "Predator Plant", "Stronger Boom", "Sunfire", "Double Stem", "Doom Cherry", "Sharper Spikes", "Rapid Pricks", "Spikerock Dream", "Sharper Needles", "Fast Needles", "Prickly Legend", "Heavy Cabbage", "Quick Toss", "Double Toss", "Royal Cabbage", "Garden Fertilizer", "Compost Armor", "Solar Winds", "Photosynthesis", "Garden Haste", "Nut Union", "Faster Fists", "Heavy Jabs", "Guard Stance"]);
  if (name === "Unlock Zombie Debuffs" || name === "Evergreen Drafts" || name === "Jackpot" || name === "Seed Vault") return "Legendary";
  if (epic.has(name)) return "Epic";
  if (rare.has(name)) return "Rare";
  if (uncommon.has(name)) return "Uncommon";
  return "Common";
}

function withRarity(item) {
  const rarity = item.type === "debuff" ? "Legendary" : rarityForBuff(item.name);
  return { ...item, rarity, weight: RARITY_WEIGHTS[rarity] };
}

function makeId(prefix) {

function clamp(n, a, b) {
  return Math.max(a, Math.min(b, n));
}

function pickWeighted(items) {
  const valid = items.filter(item => item && item.weight > 0);
  const total = valid.reduce((sum, item) => sum + item.weight, 0);
  let roll = Math.random() * total;
  for (const item of valid) {
    roll -= item.weight;
    if (roll <= 0) return item.item;
  }
  return valid[valid.length - 1]?.item;
}

function sampleWeightedUnique(items, count) {
  const out = [];
  const pool = [...items];
  while (pool.length && out.length < count) {
    const picked = pickWeighted(pool.map(item => ({ item, weight: item.weight || 1 })));
    if (!picked) break;
    out.push(picked);
    const idx = pool.findIndex(item => item.name === picked.name);
    if (idx >= 0) pool.splice(idx, 1);
  }
  return out;
}

function applyPlantStats(type, mods, global) {
  const d = plantDefs[type];
  const m = mods[type] || {};
  const isWall = d.kind === "wall" || type === "wallnut" || type === "tallnut";
  const hpMult = (m.hpMult || 1) * global.allHp * (isWall ? global.wallHp : 1);
  const damageMult = (m.damageMult || 1) * global.allDamage * (d.kind === "bomb" ? global.bombPower : 1);
  return {
    ...d,
    cost: Math.max(0, Math.round((d.cost + (m.costFlat || 0)) / 5) * 5),
    hp: Math.round((d.hp + (m.hpFlat || 0)) * hpMult),
    damage: Math.round((d.damage || 0) * damageMult),
    fireRate: (d.fireRate || 1) * (m.fireRateMult || 1) * global.shooterHaste,
    punchRate: (d.punchRate || 1) * (m.punchRateMult || 1),
    sunRate: ((d.sunRate || 1) * sunEconomySlowFactor(global)) / (m.sunRateMult || 1),
    sunAmount: Math.round(((d.sunAmount || 0) + (m.sunFlat || 0)) * global.sunValueMult),
    radius: Math.round(((d.radius || 0) + (m.radiusFlat || 0)) * (1 + (m.radiusBonus || 0)) * global.bombPower),
    fuse: (d.fuse || 1) * (m.fuseMult || 1),
    biteCd: (d.biteCd || 10) / (m.biteRateMult || 1),
    blocksAir: d.blocksAir || m.blocksAir,
    hitsAir: d.hitsAir || m.hitsAir,
    mods: m,
  };
}

function applyZombieStats(type, state) {
  const base = zombieDefs[type];
  const mods = state.zombieMods[type] || blankZombieMods()[type];
  const scale = Math.pow(1.2, state.buffCount);
  return {
    ...base,
    hp: base.hp * scale * mods.hp,
    speed: base.speed * mods.speed,
    damage: base.damage * scale * mods.damage,
    points: base.points + (mods.bonusPoints || 0),
    flying: base.flying && !mods.forceGround,
    groundedAir: mods.groundedAir || mods.forceGround,
    mods,
  };
}

function buildBuffPool(state) {
  const picked = new Set(state.pickedBuffNames || []);
  const pool = [];
  for (const [plant, buffs] of Object.entries(plantBuffs)) {
    for (const [name, desc, fn] of buffs) {
      if (state.allowBuffRepeats || !picked.has(name)) pool.push(withRarity({ type: "plant", plant, name, desc, fn }));
    }
  }
  for (const [name, desc, fn] of globalBuffs) {
    if (!state.allowBuffRepeats && picked.has(name)) continue;
    if (name === "Unlock Zombie Debuffs" && state.debuffsUnlocked) continue;
    if (name === "Evergreen Drafts" && state.allowBuffRepeats) continue;
    if (name === "Jackpot" && state.pendingPlantJackpot) continue;
    pool.push(withRarity({ type: "global", name, desc, fn }));
  }
  return pool;
}

function buildDebuffPool(state) {
  const picked = new Set(state.pickedBuffNames || []);
  const pool = [];
  for (const [zombie, debuffs] of Object.entries(zombieDebuffs)) {
    for (const [name, desc, fn] of debuffs) {
      if (!picked.has(name)) pool.push(withRarity({ type: "debuff", zombie, name, desc, fn }));
    }
  }
  return pool;
}

function filterByMinRarity(pool, minRarity) {
  if (!minRarity) return pool;
  const filtered = pool.filter(item => RARITY_RANK[item.rarity || "Common"] >= RARITY_RANK[minRarity]);
  return filtered.length ? filtered : pool;
}

function milestoneMinRarity(threshold) {
  // Applies at every multiple, not only the first time: 50, 100, 150... and 120, 240, 360...
  if (threshold > 0 && threshold % 120 === 0) return "Epic";
  if (threshold > 0 && threshold % 50 === 0) return "Rare";
  return null;
}

function makeChoices(state, minRarity = state.draftMinRarity || null) {
  const regularCount = state.debuffsUnlocked ? Math.max(0, state.choiceCount - 1) : state.choiceCount;
  const choices = sampleWeightedUnique(filterByMinRarity(buildBuffPool(state), minRarity), regularCount);
  if (state.debuffsUnlocked) {
    const debuff = sampleWeightedUnique(buildDebuffPool(state), 1)[0];
    if (debuff) choices.push(debuff);
  }
  return choices;
}

function makeDebuffChoices(state) {
  return sampleWeightedUnique(buildDebuffPool(state), 3);
}

function makePlantJackpotChoices() {
  return Object.keys(plantDefs).map(plant => ({

    weight: 1,

}

function isPlantMaxBuffed(state, plant) {
  const gotten = new Set((state.perPlantBuffNames && state.perPlantBuffNames[plant]) || []);
  return (plantBuffs[plant] || []).length > 0 && (plantBuffs[plant] || []).every(([name]) => gotten.has(name));
}

function maxBuffedPlants(state) {
  return Object.keys(plantDefs).filter(plant => isPlantMaxBuffed(state, plant));
}

function findPlantBuff(plant, name) {
  const found = (plantBuffs[plant] || []).find(([buffName]) => buffName === name);
  return found ? { plant, name: found[0], desc: found[1], fn: found[2] } : null;
}

function findGlobalBuff(name) {
  const found = globalBuffs.find(([buffName]) => buffName === name);
  return found ? { name: found[0], desc: found[1], fn: found[2] } : null;
}

function applyEvergreenEchoes(state) {
  let next = { ...state, plantMods: { ...state.plantMods }, mowers: state.mowers.map(m => ({ ...m })) };
  const seen = new Set();
  const echoed = [];
  for (const entry of [...(state.buffLog || [])].reverse()) {
    if (!REPEATABLE_BUFF_NAMES.has(entry.name) || seen.has(entry.name)) continue;
    seen.add(entry.name);
    if (entry.type === "plant") {
      const plant = entry.target;
      const buff = findPlantBuff(plant, entry.name);
      if (!buff) continue;
      next.plantMods = { ...next.plantMods, [plant]: buff.fn(next.plantMods[plant] || {}) };
      echoed.push({ name: `Evergreen Echo: ${entry.name}`, desc: `Repeated ${plantDefs[plant]?.name || plant} buff: ${buff.desc}`, rarity: "Legendary", type: "global", target: plant });
    } else if (entry.type === "global") {
      const buff = findGlobalBuff(entry.name);
      if (!buff || buff.name === "Evergreen Drafts") continue;
      next = buff.fn(next);
      echoed.push({ name: `Evergreen Echo: ${entry.name}`, desc: `Repeated global buff: ${buff.desc}`, rarity: "Legendary", type: "global", target: "Global" });
    }
  }
  return { ...next, buffLog: [...echoed, ...next.buffLog] };
}

function applyMissingBuffsForPlant(state, plant) {
  let mods = state.plantMods[plant] || {};
  const already = new Set((state.perPlantBuffNames && state.perPlantBuffNames[plant]) || []);
  const wasMaxed = isPlantMaxBuffed(state, plant);
  const gained = [];
  for (const [name, desc, fn] of plantBuffs[plant] || []) {
    if (!already.has(name)) {
      mods = fn(mods);
      gained.push({ name, desc, rarity: rarityForBuff(name), type: "plant", target: plant });
      already.add(name);
    }
  }
  const next = {
    ...state,
    plantMods: { ...state.plantMods, [plant]: mods },
    perPlantBuffNames: { ...(state.perPlantBuffNames || {}), [plant]: [...already] },
    pickedBuffNames: [...new Set([...(state.pickedBuffNames || []), ...gained.map(g => g.name)])],
    buffLog: [...gained.map(g => ({ name: g.name, desc: g.desc, rarity: g.rarity, type: "plant", target: g.target })), ...state.buffLog],
  };
  if (!wasMaxed && isPlantMaxBuffed(next, plant)) {
    return {
      ...next,
      buffLog: [{ name: `${plantDefs[plant].name} Max Buffed!`, desc: `You have every ${plantDefs[plant].name} buff.`, rarity: "Legendary", type: "global", target: plant }, ...next.buffLog],
    };
  }
  return next;
}

function cardCost(type, state) {

function fmt(n, digits = 1) {
  return Number.isFinite(n) ? Number(n).toFixed(digits).replace(/\.0$/, "") : "∞";
}

function buffPreview(choice, state) {
  if (!choice) return "";
  if (choice.type === "plantJackpot") {
    const already = new Set((state.perPlantBuffNames && state.perPlantBuffNames[choice.plant]) || []);
    const missing = (plantBuffs[choice.plant] || []).filter(([name]) => !already.has(name));
    if (!missing.length) return `${plantDefs[choice.plant].name} has no missing buffs. You still get one hidden random plant jackpot.`;
    const nl = String.fromCharCode(10);
    const list = missing.map(([name, desc]) => `• ${name}: ${desc}`).join(nl);
    return `Unlocks for ${plantDefs[choice.plant].name}:${nl}${list}${nl}Also jackpots one hidden random plant.`;
  }
  if (choice.type === "plant") {
    const before = applyPlantStats(choice.plant, state.plantMods, state);
    const afterMods = { ...state.plantMods, [choice.plant]: choice.fn(state.plantMods[choice.plant] || {}) };
    const after = applyPlantStats(choice.plant, afterMods, state);
    const parts = [];
    if (before.cost !== after.cost) parts.push(`Cost: ${before.cost} → ${after.cost}`);
    if (before.hp !== after.hp) parts.push(`HP: ${before.hp} → ${after.hp}`);
    if (before.damage !== after.damage && after.damage > 0) parts.push(`Damage: ${before.damage} → ${after.damage}`);
    if (before.fireRate !== after.fireRate && before.kind !== "sun") parts.push(`Fire rate: ${fmt(before.fireRate)}/s → ${fmt(after.fireRate)}/s`);
    if (before.punchRate !== after.punchRate && before.kind === "melee") parts.push(`Punch rate: ${fmt(before.punchRate)}/s → ${fmt(after.punchRate)}/s`);
    if (before.sunRate !== after.sunRate && before.kind === "sun") parts.push(`Sunflower bloom: 1 every ${fmt(before.sunRate)}s → 1 every ${fmt(after.sunRate)}s`);
    if (before.sunAmount !== after.sunAmount && before.kind === "sun") parts.push(`Sun: ${before.sunAmount} → ${after.sunAmount}`);
    if (before.biteCd !== after.biteCd && before.kind === "chomper") parts.push(`Chew time: ${fmt(before.biteCd)}s → ${fmt(after.biteCd)}s`);
    if (before.radius !== after.radius && before.kind === "bomb") parts.push(`Radius: ${before.radius} → ${after.radius}`);
    if (choice.name === "Rogue Petals") parts.push("New ability: Sunflower sun gives +0.1 rogue points when collected");
    if (choice.name === "Fourteen-Armed Choynado") parts.push("New ability: Bonk Choy covers a 3x5 area and spins every 20s");
    if (parts.length) return parts.join(" · ");
    return `New ability: ${choice.desc}`;
  }
  if (choice.type === "global") {
    const before = state;
    const after = choice.fn({ ...state, mowers: state.mowers.map(m => ({ ...m })) });
    const parts = [];
    if (before.allDamage !== after.allDamage) parts.push(`All damage: ${fmt(before.allDamage, 2)}x → ${fmt(after.allDamage, 2)}x`);
    if (before.allHp !== after.allHp) parts.push(`All HP: ${fmt(before.allHp, 2)}x → ${fmt(after.allHp, 2)}x`);
    if (before.skySunRate !== after.skySunRate) parts.push(`Sky sun: 1 every ${fmt(currentSkySunInterval(before))}s → 1 every ${fmt(currentSkySunInterval(after))}s`);
    if (before.maxSun !== after.maxSun) parts.push(`Max sun: ${before.maxSun} → ${after.maxSun}`);
    if (choice.name === "Evergreen Drafts") parts.push("New rule: plant/global buffs can repeat; repeatable buffs you already got trigger once more now");
    if (choice.name === "Jackpot") parts.push("Choose a plant to jackpot, plus one hidden random plant");
    if (before.sun !== after.sun) parts.push(`Sun now: ${Math.floor(before.sun)} → ${Math.floor(after.sun)}`);
    if (before.mowerRecharge !== after.mowerRecharge) parts.push(`Mower recharge: ${before.mowerRecharge ?? "off"} → ${after.mowerRecharge}s`);
    if (before.cooldownMult !== after.cooldownMult) parts.push(`Cooldowns: ${fmt(before.cooldownMult, 2)}x → ${fmt(after.cooldownMult, 2)}x`);
    if (before.choiceCount !== after.choiceCount) parts.push(`Choices: ${before.choiceCount} → ${after.choiceCount}`);
    if (parts.length) return parts.join(" · ");
    return `New ability: ${choice.desc}`;
  }
  if (choice.type === "debuff") {
    const before = applyZombieStats(choice.zombie, state);
    const afterMods = choice.fn(state.zombieMods);
    const after = applyZombieStats(choice.zombie, { ...state, zombieMods: afterMods });
    const parts = [];
    if (before.hp !== after.hp) parts.push(`${before.name} HP: ${Math.round(before.hp)} → ${Math.round(after.hp)}`);
    if (before.speed !== after.speed) parts.push(`Speed: ${fmt(before.speed)} → ${fmt(after.speed)}`);
    if (before.damage !== after.damage) parts.push(`Damage: ${Math.round(before.damage)} → ${Math.round(after.damage)}`);
    if (before.points !== after.points) parts.push(`Points: ${before.points} → ${after.points}`);
    if (before.flying !== after.flying) parts.push("Flying: yes → no");
    if (parts.length) return parts.join(" · ");
    return `New rule: ${choice.desc}`;
  }
  return "";
}

function makeBuildCopyText(state, scaling) {
  const lines = state.buffLog.length
    ? state.buffLog.map((b, i) => `${i + 1}. [${b.rarity || "Common"}] ${b.name} — ${b.desc}`)
    : ["No buffs/debuffs yet."];
  return ["PvZ Rogue Build", `Score: ${state.score}`, `Buffs: ${state.buffCount}`, `Zombie Scale: ${scaling}x`, "", ...lines].join("\n");
}

function makeOfferCopyText(choices, state, scaling) {
  const lines = choices.length
    ? choices.map((c, i) => {
        const target = c.type === "plant" || c.type === "plantJackpot" ? plantDefs[c.plant].name : c.type === "debuff" ? zombieDefs[c.zombie]?.name || "Zombie" : "Global";
        return `${i + 1}. [${c.rarity || "Common"}] ${c.name} (${target}) — ${c.desc}\n   Preview: ${buffPreview(c, state)}`;
      })
    : ["No buffs currently offered."];
  return ["PvZ Rogue Offered Buffs", `Score: ${state.score}`, `Buffs: ${state.buffCount}`, `Zombie Scale: ${scaling}x`, "", ...lines].join("\n");
}

async function robustCopy(text) {
  if (!text) return false;
  try {
    if (navigator?.clipboard?.writeText && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
      return true;
    }
  } catch {
    // Try fallback below.
  }
  try {
    const textarea = document.createElement("textarea");
    textarea.value = text;
    textarea.setAttribute("readonly", "");
    textarea.style.position = "fixed";
    textarea.style.left = "-9999px";
    textarea.style.top = "0";
    document.body.appendChild(textarea);
    textarea.focus();
    textarea.select();
    const ok = document.execCommand("copy");
    document.body.removeChild(textarea);
    return ok;
  } catch {
    return false;
  }
}

function PvZRoguePrototype() {
  const [state, setState] = useState(() => {
    try {
      const saved = localStorage.getItem(SAVE_KEY);
      if (!saved) return baseState();
      return normalizeState(JSON.parse(saved));
    } catch {
      return baseState();
    }
  });
  const [copyNote, setCopyNote] = useState("");
  const [offerCopyNote, setOfferCopyNote] = useState("");
  const [buffPickLocked, setBuffPickLocked] = useState(false);
  const [uiScale, setUiScale] = useState(1);
  const stateRef = useRef(state);
  const lastTick = useRef(Date.now());
  stateRef.current = state;

  const plantCards = useMemo(() => state.seedLoadout || Object.keys(plantDefs).slice(0, state.seedSlots || 8), [state.seedLoadout, state.seedSlots]);
  const scaling = Math.pow(1.2, state.buffCount).toFixed(2);
  const maxedPlants = maxBuffedPlants(state);


  useEffect(() => {
    function updateScale() {
      const widthScale = window.innerWidth / 760;
      const heightScale = window.innerHeight / 620;
      setUiScale(clamp(Math.min(widthScale, heightScale), 1.15, 2));
    }

    updateScale();
    window.addEventListener("resize", updateScale);
    return () => window.removeEventListener("resize", updateScale);
  }, []);

  useEffect(() => {
    const id = setInterval(() => {
      try {
        localStorage.setItem(SAVE_KEY, JSON.stringify({ ...stateRef.current, running: false }));
      } catch {
        // Ignore save failures.
      }
    }, 1500);
    return () => clearInterval(id);
  }, []);

  useEffect(() => {
    if (!state.pausedForBuff) return undefined;
    // Prevents accidentally picking a buff while the player is still clicking/dragging to place or shovel a plant.
    setBuffPickLocked(true);
    const id = setTimeout(() => setBuffPickLocked(false), 2000);
    return () => clearTimeout(id);
  }, [state.pausedForBuff, state.draftMode, state.choices]);

  useEffect(() => {
    const interval = setInterval(() => {
      const now = Date.now();
      const dt = Math.min(0.25, (now - lastTick.current) / 1000);
      lastTick.current = now;
      setState(prev => step(prev, dt));
    }, TICK_MS);
    return () => clearInterval(interval);
  }, []);

  function startDebuffDraft(next, count) {
    return { ...next, pausedForBuff: true, draftMode: "debuff", pendingDebuffDrafts: count, choices: makeDebuffChoices(next) };
  }

  function startPlantJackpotDraft(next) {
    return { ...next, pausedForBuff: true, draftMode: "plantJackpot", choices: makePlantJackpotChoices() };
  }

  function step(prev, dt) {
    if (!prev.running || prev.pausedForBuff || prev.gameOver) return prev;

    let s = { ...prev, elapsed: prev.elapsed + dt };
    let plants = prev.plants.map(p => ({ ...p }));
    let zombies = prev.zombies.map(z => ({ ...z }));
    let allies = (prev.allies || []).map(a => ({ ...a }));
    let projectiles = prev.projectiles.map(p => ({ ...p }));
    let floaties = prev.floaties.map(f => ({ ...f, life: f.life - dt, y: f.y - 16 * dt }));
    let suns = (prev.suns || []).map(orb => ({ ...orb, life: orb.life - dt, age: (orb.age || 0) + dt })).filter(orb => orb.life > 0);
    let burns = prev.burns.map(b => ({ ...b, life: b.life - dt, tick: b.tick - dt })).filter(b => b.life > 0);
    let mowers = prev.mowers.map(m => ({ ...m }));
    let sun = prev.sun;
    let score = prev.score;
    let roguePoints = prev.roguePoints;
    let nextBuffAt = prev.nextBuffAt;
    let pausedForBuff = false;
    let choices = prev.choices;
    let gameOver = false;

    s.skySunMeter += dt * s.skySunRate;
    const skyInterval = currentSkySunInterval(s);
    while (s.skySunMeter >= skyInterval) {
      s.skySunMeter -= skyInterval;
      const amount = Math.round(50 * s.sunValueMult);
      suns.push({ id: makeId("sun"), amount, x: 28 + Math.random() * (BOARD_W - 70), y: 24 + Math.random() * (BOARD_H - 70), life: 12, age: 0 });
    }

    s.spawnMeter += dt;
    while (s.spawnMeter >= 5) {
      s.spawnMeter -= 5;
      zombies.push(createZombie(s));
    }

    plants = plants.map(p => {
      const stats = applyPlantStats(p.type, s.plantMods, s);
      const next = { ...p };
      next.cd = Math.max(0, next.cd - dt);
      next.timer += dt;

      if (s.globalRegen || stats.mods.regen) next.hp = Math.min(next.maxHp, next.hp + (s.globalRegen + (stats.mods.regen || 0)) * dt);
      if (stats.mods.panicHeal && !next.panicUsed && next.hp < next.maxHp * 0.3) {
        next.hp = Math.min(next.maxHp, next.hp + next.maxHp * 0.35);
        next.panicUsed = true;
      }

      if (stats.kind === "sun") {
        let rate = stats.sunRate;
        if (stats.mods.lowSunBoost && sun < 100) rate *= 0.65;
        if (next.timer >= rate) {
          next.timer = 0;
          next.bloomCount += 1;
          let amount = stats.sunAmount;
          if (stats.mods.doubleBloom && Math.random() < stats.mods.doubleBloom) amount *= 2;
          if (stats.mods.goldenBloom && next.bloomCount % 5 === 0) amount += 50;
          if (stats.mods.bankGain) s.maxSun += stats.mods.bankGain;
          suns.push({ id: makeId("sun"), amount, x: next.col * CELL_W + 28, y: next.row * CELL_H + 18, row: next.row, life: 12, age: 0, fromSunflower: true });
        }
      }

      if ((stats.kind === "shooter" || stats.kind === "lobber") && next.cd <= 0) {
        const canHit = z => z.row === next.row && z.x > next.col * CELL_W + 35 && (!z.flying || stats.hitsAir || z.groundedAir);
        if (zombies.some(canHit)) {
          const shots = 1 + (stats.mods.extraShots || 0) + (Math.random() < (stats.mods.doubleChance || 0) ? 1 : 0) + (Math.random() < (stats.mods.tripleChance || 0) ? 2 : 0);
          for (let i = 0; i < shots; i += 1) {
            projectiles.push({
              id: makeId("proj"), row: next.row, x: next.col * CELL_W + 50, y: next.row * CELL_H + 30 + i * 5,
              damage: stats.damage, speed: stats.kind === "lobber" ? 190 : 260, pierce: stats.mods.pierce || 1,
              source: next.type, slow: stats.mods.slowOnHit || 0, splash: stats.mods.splash || 0,
              stun: stats.mods.stunChance || 0, poison: stats.mods.poison || 0, airMult: stats.mods.airDamageMult || 1,
            });
          }
          next.shotCount += shots;
          if (stats.mods.shotSunEvery && next.shotCount >= stats.mods.shotSunEvery) {
            next.shotCount = 0;
            sun = Math.min(s.maxSun, sun + 25);
            floaties.push({ id: makeId("shotSun"), text: "+25☀", x: next.col * CELL_W + 38, y: next.row * CELL_H + 20, life: 1 });
          }
          next.cd = (1 / stats.fireRate) * s.cooldownMult;
        }
      }

      if (stats.kind === "melee" && next.cd <= 0) {
        const hitRows = stats.mods.crossLane || stats.mods.choynado ? [next.row - 1, next.row, next.row + 1] : [next.row];
        const hitCols = stats.mods.choynado ? [next.col - 2, next.col - 1, next.col, next.col + 1, next.col + 2] : [next.col - 1, next.col, next.col + 1];
        const targets = zombies.filter(z => !z.flying && hitRows.includes(z.row) && hitCols.includes(Math.floor(z.x / CELL_W)) && !(stats.mods.choynado && z.row === next.row && Math.floor(z.x / CELL_W) === next.col));
        if (targets.length) {
          const target = targets[0];
          next.punchCount += 1;
          const surge = stats.mods.spinachSurge && next.punchCount % 6 === 0 ? 2 : 1;
          target.hp -= stats.damage * surge;
          next.cd = (1 / stats.punchRate) * s.cooldownMult;
        }
        if (stats.mods.choynado) {
          next.spinTimer += dt;
          if (next.spinTimer >= 20 && next.spinTime <= 0) {
            next.spinTimer = 0;
            next.spinTime = 3;
            next.spinTick = 0;
          }
        }
      }

      if (stats.kind === "chomper" && next.cd <= 0) {
        const rangePx = (stats.mods.biteRange || 1) * CELL_W;
        const front = z => z.row === next.row && !z.flying && z.x > next.col * CELL_W && z.x < next.col * CELL_W + rangePx + 60;
        const back = z => stats.mods.backbite && z.row === next.row && !z.flying && z.x < next.col * CELL_W && z.x > next.col * CELL_W - rangePx - 20;
        const target = zombies.find(z => front(z) || back(z));
        if (target) {
          target.hp -= stats.biteDamage * (stats.mods.biteDamageMult || 1);
          if (stats.mods.eatSun) sun = Math.min(s.maxSun, sun + stats.mods.eatSun);
          if (stats.mods.burpDamage) zombies.forEach(z => { if (z.row === next.row && z.x > next.col * CELL_W) z.hp -= stats.mods.burpDamage; });
          const chew = Math.random() < (stats.mods.freeBiteChance || 0) ? 0.4 : stats.biteCd;
          next.cd = chew;
          next.chewMax = chew;
        }
      }

      if (stats.kind === "bomb") {
        next.fuse -= dt;
        if (next.fuse <= 0) next.explode = true;
      }

      return next;
    });

    for (const p of plants) {
      const stats = applyPlantStats(p.type, s.plantMods, s);
      if (stats.kind === "spike") {
        zombies.forEach(z => {
          const sameTile = z.row === p.row && !z.flying && z.x > p.col * CELL_W - 12 && z.x < (p.col + 1 + (stats.mods.widthBonus || 0)) * CELL_W;
          if (sameTile) {
            const damageFactor = z.type === "gargantuar" ? (stats.mods.bossDamageMult || 1) : 1;
            z.hp -= stats.damage * damageFactor * dt;
            p.hp -= 10 * dt;
            if (stats.mods.slowOnHit) z.slow = Math.max(z.slow, 2.5);
          }
        });
      }

      if (stats.kind === "melee" && stats.mods.choynado && p.spinTime > 0) {
        p.spinTime -= dt;
        p.spinTick -= dt;
        if (p.spinTick <= 0) {
          p.spinTick = 0.2;
          zombies.forEach(z => {
            const zCol = Math.floor(z.x / CELL_W);
            const inThreeByFive = Math.abs(z.row - p.row) <= 1 && Math.abs(zCol - p.col) <= 2 && !(z.row === p.row && zCol === p.col);
            if (!z.flying && inThreeByFive) z.hp -= stats.damage;
          });
        }
      }

      if (p.explode) {
        const rad = Math.max(1, stats.radius);
        zombies.forEach(z => {
          const zCol = Math.floor(z.x / CELL_W);
          if (Math.abs(z.row - p.row) <= rad && Math.abs(zCol - p.col) <= rad) z.hp -= (stats.damage || 3600) * (z.type === "gargantuar" ? (stats.gargBonus || 1.25) : 1);
        });
        if (stats.mods.burnGround) burns.push({ id: makeId("burn"), row: p.row, col: p.col, radius: rad, damage: stats.mods.burnGround, life: 4, tick: 0.5 });
        p.hp = 0;
      }
    }

    for (const burn of burns) {
      if (burn.tick <= 0) {
        burn.tick = 0.5;
        zombies.forEach(z => {
          const zCol = Math.floor(z.x / CELL_W);
          if (Math.abs(z.row - burn.row) <= burn.radius && Math.abs(zCol - burn.col) <= burn.radius) z.hp -= burn.damage;
        });
      }
    }

    const hasSolarFlare = plants.some(p => p.type === "sunflower" && applyPlantStats("sunflower", s.plantMods, s).mods.sunShooter);
    if (hasSolarFlare) {
      const firingSuns = suns.filter(orb => orb.fromSunflower && orb.age >= 5 && zombies.some(z => z.row === orb.row && z.x > orb.x));
      for (const orb of firingSuns) {
        projectiles.push({ id: makeId("sunbolt"), row: orb.row ?? Math.floor(orb.y / CELL_H), x: orb.x, y: orb.y, damage: 1000, speed: 310, pierce: 1, source: "sunflower", slow: 0, splash: 0, stun: 0, poison: 0, airMult: 1 });
      }
      if (firingSuns.length) suns = suns.filter(orb => !(orb.fromSunflower && orb.age >= 5 && zombies.some(z => z.row === orb.row && z.x > orb.x)));
    }

    allies = allies.map(a => ({ ...a, cd: Math.max(0, a.cd - dt), x: a.x + a.speed * dt })).filter(a => a.hp > 0 && a.x < BOARD_W + 80);
    for (const ally of allies) {
      const target = zombies.find(z => z.row === ally.row && Math.abs(z.x - ally.x) < 26);
      if (target && ally.cd <= 0) {
        target.hp -= ally.damage;
        ally.cd = 0.45;
      }
      if (target && target.eatCd <= 0) {
        ally.hp -= target.damage * 0.25;
        target.eatCd = 0.45;
      }
    }

    projectiles = projectiles.map(pr => ({ ...pr, prevX: pr.x, x: pr.x + pr.speed * dt })).filter(pr => pr.x < BOARD_W + 80 && pr.pierce > 0);
    for (const pr of projectiles) {
      const minX = Math.min(pr.prevX ?? pr.x, pr.x) - 22;
      const maxX = Math.max(pr.prevX ?? pr.x, pr.x) + 22;
      const target = zombies.find(z => z.row === pr.row && z.x >= minX && z.x <= maxX && (!z.flying || z.groundedAir || pr.source === "cactus" || pr.source === "cabbagepult" || pr.source === "sunflower"));
      if (target) {
        const targetMods = s.zombieMods[target.type] || {};
        target.hp -= pr.damage * (target.flying ? pr.airMult : 1) * (targetMods.damageTaken || 1);
        if (pr.slow) target.slow = Math.max(target.slow, 2.5);
        if (pr.stun && Math.random() < pr.stun) target.stun = Math.max(target.stun, 0.8);
        if (pr.poison) target.poison = Math.max(target.poison, pr.poison);
        if (pr.splash) zombies.forEach(other => { if (other.id !== target.id && other.row === target.row && Math.abs(other.x - target.x) < CELL_W) other.hp -= pr.damage * pr.splash * ((s.zombieMods[other.type] || {}).damageTaken || 1); });
        pr.pierce -= 1;
      }
    }

    zombies = zombies.map(z => {
      const mods = s.zombieMods[z.type] || {};
      const next = { ...z, eatCd: Math.max(0, z.eatCd - dt), slow: Math.max(0, z.slow - dt), stun: Math.max(0, z.stun - dt), throwCd: Math.max(0, z.throwCd - dt) };
      if (next.poison) next.hp -= next.poison * dt;

      if (next.type === "gargantuar" && next.throwCd <= 0) {
        const landX = Math.max(2 * CELL_W, next.x - 5 * CELL_W);
        if (mods.kaleImps) allies.push(createKaleImp(next.row, landX));
        else zombies.push(createZombie(s, "imp", next.row, landX));
        floaties.push({ id: makeId("throw"), text: mods.kaleImps ? "KALE!" : "IMP!", x: next.x, y: next.row * CELL_H + 10, life: 0.9 });
        next.throwCd = 14;
      }

      const blocker = plants.find(p => {
        const stats = applyPlantStats(p.type, s.plantMods, s);
        return p.row === next.row && p.hp > 0 && stats.kind !== "spike" && next.x > p.col * CELL_W + 18 && next.x < p.col * CELL_W + 56 && (!next.flying || stats.blocksAir);
      });

      if (!blocker && next.type === "gargantuar" && next.eatCd <= 0) {
        const spike = plants.find(p => p.type === "spikeweed" && p.row === next.row && p.hp > 0 && next.x > p.col * CELL_W + 12 && next.x < (p.col + 1) * CELL_W);
        if (spike) {
          if (mods.noSmash) {
            next.stun = Math.max(next.stun, 0.15);
            return next;
          }
          spike.hp = 0;
          next.eatCd = 1.2;
          floaties.push({ id: makeId("smash"), text: "SMASH!", x: spike.col * CELL_W + 14, y: spike.row * CELL_H + 18, life: 0.9 });
        }
      }

      if (blocker) {
        const pst = applyPlantStats(blocker.type, s.plantMods, s);
        if (pst.mods.knockbackOnce && !blocker.knocked) {
          next.x += 55;
          blocker.knocked = true;
        }
        if (pst.mods.antiAirContact && next.flying) next.hp -= pst.mods.antiAirContact * dt;
        if (next.eatCd <= 0 && !pst.mods.invulnerableFuse) {
          const eatMult = next.type === "gargantuar" && mods.noSmash ? 0.18 : 0.34;
          blocker.hp -= next.damage * (pst.mods.damageTakenMult || 1) * eatMult;
          if (pst.mods.thorns) next.hp -= pst.mods.thorns;
          next.eatCd = next.type === "gargantuar" && mods.noSmash ? 0.75 : 0.34;
        }
      } else if (next.stun <= 0) {
        next.x -= next.speed * (next.slow > 0 ? 0.55 : 1) * dt;
      }
      return next;
    });

    for (const mower of mowers) {
      if (!mower.active && s.mowerRecharge != null) {
        mower.recharge -= dt;
        if (mower.recharge <= 0) {
          mower.active = true;
          mower.recharge = 0;
        }
      }
      const danger = zombies.find(z => z.row === mower.row && z.x < 8);
      if (danger && mower.active) {
        mower.active = false;
        mower.recharge = s.mowerRecharge ?? Infinity;
        zombies.forEach(z => { if (z.row === mower.row) z.hp -= s.mowerDamage; });
        floaties.push({ id: makeId("mower"), text: "MOWER!", x: 20, y: mower.row * CELL_H + 26, life: 1.2 });
      } else if (danger && !mower.active) {
        gameOver = true;
      }
    }

    plants.filter(p => p.hp <= 0).forEach(p => {
      const stats = applyPlantStats(p.type, s.plantMods, s);
      if (stats.mods.deathSun) sun = Math.min(s.maxSun, sun + stats.mods.deathSun);
    });
    plants = plants.filter(p => p.hp > 0);

    const killed = zombies.filter(z => z.hp <= 0);
    for (const z of killed) {
      score += z.points;
      roguePoints += z.points;
      if (Math.random() < s.zombieSunDrop) {
        sun = Math.min(s.maxSun, sun + 25);
        floaties.push({ id: makeId("drop"), text: "+25☀", x: z.x, y: z.row * CELL_H + 20, life: 1 });
      }
    }
    zombies = zombies.filter(z => z.hp > 0);
    projectiles = projectiles.filter(p => p.pierce > 0);
    floaties = floaties.filter(f => f.life > 0);

    while (roguePoints >= nextBuffAt) {
      sun = Math.min(s.maxSun, sun + 250);
      floaties.push({ id: makeId("rpSun"), text: "+250☀", x: BOARD_W / 2 - 30, y: 18, life: 1.1 });
      pausedForBuff = true;
      const minRarity = milestoneMinRarity(nextBuffAt);
      choices = makeChoices({ ...s, sun, maxSun: s.maxSun, roguePoints, nextBuffAt, draftMinRarity: minRarity }, minRarity);
      nextBuffAt += 10;
      break;
    }

    return { ...s, plants, zombies, allies, projectiles, floaties, suns, burns, mowers, sun, score, roguePoints, nextBuffAt, pausedForBuff, draftMode: "normal", choices, gameOver };
  }

  function collectSun(id) {
    setState(prev => {
      const orb = (prev.suns || []).find(s => s.id === id);
      if (!orb) return prev;
      const sunflowerStats = applyPlantStats("sunflower", prev.plantMods, prev);
      const rogueGain = orb.fromSunflower && sunflowerStats.mods.rogueSun ? 0.1 : 0;
      let next = {
        ...prev,
        sun: Math.min(prev.maxSun, prev.sun + orb.amount),
        roguePoints: prev.roguePoints + rogueGain,
        suns: prev.suns.filter(s => s.id !== id),
        floaties: [...prev.floaties, { id: makeId("collect"), text: rogueGain ? `+${orb.amount}☀ +0.1 RP` : `+${orb.amount}☀`, x: orb.x, y: orb.y, life: 0.8 }],
      };
      while (rogueGain && next.roguePoints >= next.nextBuffAt && !next.pausedForBuff && !next.gameOver) {
        const minRarity = milestoneMinRarity(next.nextBuffAt);
        next = { ...next, sun: Math.min(next.maxSun, next.sun + 250), pausedForBuff: true, draftMode: "normal", draftMinRarity: minRarity, choices: makeChoices({ ...next, draftMinRarity: minRarity }, minRarity), nextBuffAt: next.nextBuffAt + 10 };
      }
      return next;
    });
  }

  function place(row, col) {
    setState(prev => {
      if (prev.pausedForBuff || prev.gameOver) return prev;
      const existing = prev.plants.find(p => p.row === row && p.col === col);
      if (prev.shovel) {
        if (!existing) return prev;
        const refund = Math.round(cardCost(existing.type, prev) * prev.shovelRefund);
        return { ...prev, plants: prev.plants.filter(p => p.id !== existing.id), sun: Math.min(prev.maxSun, prev.sun + refund), shovel: false };
      }
      const cost = cardCost(prev.selected, prev);
      if (prev.sun < cost) return prev;
      if (existing && prev.selected !== "cherrybomb") return prev;
      const newPlant = createPlant(prev.selected, row, col, prev);
      const plants = prev.selected === "cherrybomb" && existing
        ? [...prev.plants.filter(p => p.id !== existing.id), newPlant]
        : [...prev.plants, newPlant];
      return { ...prev, sun: prev.sun - cost, plants, plantsPlaced: prev.plantsPlaced + 1 };
    });
  }

  function chooseBuff(choice) {
    if (buffPickLocked) return;
    setState(prev => {
      let next = { ...prev };
      if (choice.type === "plantJackpot") {
        const plantKeys = Object.keys(plantDefs);
        const randomPlant = plantKeys[Math.floor(Math.random() * plantKeys.length)];
        next = applyMissingBuffsForPlant(next, choice.plant);
        next = applyMissingBuffsForPlant(next, randomPlant);
        next.buffLog = [
          { name: `Jackpot Pick: ${plantDefs[choice.plant].name}`, desc: `Gained every missing ${plantDefs[choice.plant].name} buff.`, rarity: "Legendary", type: "global", target: choice.plant },
          { name: `Hidden Jackpot: ${plantDefs[randomPlant].name}`, desc: `Also gained every missing ${plantDefs[randomPlant].name} buff.`, rarity: "Legendary", type: "global", target: randomPlant },
          ...next.buffLog,
        ];
        return { ...next, pausedForBuff: false, draftMode: "normal", draftMinRarity: null, pendingDebuffDrafts: 0, pendingPlantJackpot: false, choices: [] };
      }

      if (choice.type === "plant") {
        next.plantMods = { ...prev.plantMods, [choice.plant]: choice.fn(prev.plantMods[choice.plant] || {}) };
        const current = new Set((prev.perPlantBuffNames && prev.perPlantBuffNames[choice.plant]) || []);
        const wasMaxed = isPlantMaxBuffed(prev, choice.plant);
        current.add(choice.name);
        next.perPlantBuffNames = { ...(prev.perPlantBuffNames || {}), [choice.plant]: [...current] };
        if (!wasMaxed && isPlantMaxBuffed(next, choice.plant)) {
          next.buffLog = [{ name: `${plantDefs[choice.plant].name} Max Buffed!`, desc: `You have every ${plantDefs[choice.plant].name} buff.`, rarity: "Legendary", type: "global", target: choice.plant }, ...next.buffLog];
          next.floaties = [...(next.floaties || []), { id: makeId("maxed"), text: `${plantDefs[choice.plant].name} MAX!`, x: BOARD_W / 2 - 55, y: 42, life: 2 }];
        }
      } else if (choice.type === "global") {
        next = choice.fn({ ...next, mowers: next.mowers.map(m => ({ ...m })) });
      } else if (choice.type === "debuff") {
        next.zombieMods = choice.fn(prev.zombieMods);
      }

      if (choice.type !== "debuff") next.buffCount = prev.buffCount + 1;
      next.pickedBuffNames = [...new Set([...(prev.pickedBuffNames || []), choice.name])];
      next.buffLog = [{ name: choice.name, desc: choice.desc, rarity: choice.rarity, type: choice.type, target: choice.plant || choice.zombie || "Global" }, ...prev.buffLog];

      if (choice.name === "Jackpot") return startPlantJackpotDraft(next);

      if (choice.name === "Unlock Zombie Debuffs") return startDebuffDraft(next, 3);
      if (prev.draftMode === "debuff") {
        const remaining = Math.max(0, prev.pendingDebuffDrafts - 1);
        if (remaining > 0) return startDebuffDraft({ ...next, pendingDebuffDrafts: remaining }, remaining);
      }
      return { ...next, pausedForBuff: false, draftMode: "normal", draftMinRarity: null, pendingDebuffDrafts: 0, choices: [] };
    });
  }

  function restart() {
    localStorage.removeItem(SAVE_KEY);
    setState(baseState());
    lastTick.current = Date.now();
  }

  async function copyBuffs() {
    setCopyNote("");
    const ok = await robustCopy(makeBuildCopyText(state, scaling));
    setCopyNote(ok ? "Copied!" : "Copy failed");
    setTimeout(() => setCopyNote(""), 1400);
  }

  async function copyOfferedBuffs() {
    setOfferCopyNote("");
    const ok = await robustCopy(makeOfferCopyText(state.choices, state, scaling));
    setOfferCopyNote(ok ? "Copied!" : "Copy failed");
    setTimeout(() => setOfferCopyNote(""), 1400);
  }

  return (
    <div className="min-h-screen overflow-x-auto bg-gradient-to-b from-emerald-950 via-green-900 to-lime-950 p-2 text-white">
      <div className="mx-auto w-fit origin-top space-y-2" style={{ transform: `scale(${uiScale})` }}>
        <div className="flex max-w-[940px] items-end justify-between gap-2">
          <div>
            <h1 className="text-xl font-black tracking-tight">PvZ Rogue</h1>
            <p className="max-w-md text-xs text-lime-100/80">Every 10 rogue points gives a buff. Each buff makes zombies 1.2x stronger.</p>
          </div>
          <div className="flex flex-wrap justify-end gap-1.5 text-xs">
            <Badge>☀ {Math.floor(state.sun)} / {state.maxSun}</Badge>
            <Badge>Rogue {fmt(state.roguePoints, 1)} / {state.nextBuffAt}</Badge>
            <Badge>Buffs {state.buffCount}</Badge>
            <Badge>Scale {scaling}x</Badge>
            <Button onClick={() => setState(s => ({ ...s, running: !s.running }))} className="h-7 rounded-lg px-2 text-xs">{state.running ? "Pause" : "Resume"}</Button>
            <Button onClick={restart} variant="secondary" className="h-7 rounded-lg px-2 text-xs">Restart</Button>
          </div>
        </div>

        <div className="flex items-start gap-2">
          <Card className="w-[106px] shrink-0 rounded-xl border-white/15 bg-white/10 text-white shadow-xl">
            <CardContent className="space-y-1 p-1">
              <div className="text-[10px] font-bold">Seeds</div>
              <div className="text-[8px] text-lime-100/75">Loadout {(state.seedLoadout||[]).length}/{state.seedSlots} · Midgame swaps {state.midgameSwaps||0}</div>
              <div className="grid grid-cols-2 gap-1 max-h-24 overflow-auto rounded border border-white/10 p-1">
                {Object.keys(plantDefs).map(type => {
                  const inLoadout = (state.seedLoadout || []).includes(type);
                  const atCap = (state.seedLoadout || []).length >= state.seedSlots;
                  const canSwap = !state.running || (state.midgameSwaps || 0) > 0;
                  return <button key={`pick_${type}`} onClick={() => setState(prev => {
                    const cur = prev.seedLoadout || [];
                    const has = cur.includes(type);
                    if (has) return { ...prev, seedLoadout: cur.filter(k => k !== type), selected: prev.selected === type ? (cur.find(k => k !== type) || "peashooter") : prev.selected };
                    if (atCap && !canSwap) return prev;
                    if (atCap) {
                      const drop = cur[cur.length - 1];
                      return { ...prev, seedLoadout: [...cur.slice(0, -1), type], selected: type, midgameSwaps: Math.max(0, (prev.midgameSwaps || 0) - 1), floaties: [...(prev.floaties||[]), { id: makeId("swap"), text: `Swapped ${plantDefs[drop].name} → ${plantDefs[type].name}`, x: 80, y: 24, life: 2 }] };
                    }
                    return { ...prev, seedLoadout: [...cur, type], selected: type };
                  })} className={`rounded px-1 py-0.5 text-[8px] ${inLoadout?"bg-lime-300 text-green-950":"bg-black/25 text-lime-50"}`}>{plantDefs[type].name}</button>;
                })}
              </div>
              <div className="grid grid-cols-1 gap-1">
                {plantCards.map(type => {
                  const def = plantDefs[type];
                  const cost = cardCost(type, state);
                  const selected = state.selected === type && !state.shovel;
                  return (
                    <button key={type} onClick={() => setState(s => ({ ...s, selected: type, shovel: false }))} className={`flex items-center gap-1 rounded-md border px-1 py-0.5 text-left transition ${selected ? "border-lime-100 bg-lime-300 text-green-950" : "border-white/10 bg-black/25 hover:bg-white/15"}`}>
                      <div className="w-5 shrink-0 leading-none"><PlantSprite type={type} small /></div>
                      <div className="min-w-0">
                        <div className="max-w-[72px] truncate text-[8px] font-bold leading-tight">{def.name}</div>
                        <div className="text-[8px] leading-tight">{cost}</div>
                      </div>
                    </button>
                  );
                })}
              </div>
              <Button onClick={() => setState(s => ({ ...s, shovel: !s.shovel }))} variant={state.shovel ? "default" : "secondary"} className="h-6 w-full rounded-md px-1 text-[9px]">{state.shovel ? "Shovel on" : "Shovel"}</Button>
              <div className="text-[8px] leading-tight text-lime-100/65">Hover sun.</div>
            </CardContent>
          </Card>

          <div className="relative shrink-0 overflow-hidden rounded-xl border border-white/15 bg-green-800 shadow-2xl" style={{ width: BOARD_W, height: BOARD_H }}>
            <div className="absolute inset-0">
              {Array.from({ length: ROWS * COLS }).map((_, i) => {
                const row = Math.floor(i / COLS);
                const col = i % COLS;
                return <button key={i} onClick={() => place(row, col)} className={`absolute select-none border border-black/15 ${((row + col) % 2) ? "bg-lime-700/55" : "bg-green-700/65"} hover:bg-lime-300/30`} style={{ left: col * CELL_W, top: row * CELL_H, width: CELL_W, height: CELL_H }} />;
              })}
            </div>

            {state.mowers.map(m => <div key={m.row} className={`pointer-events-none select-none absolute z-20 rounded-xl px-1 text-2xl ${m.active ? "opacity-100" : "opacity-25"}`} style={{ left: 4, top: m.row * CELL_H + 20 }}>{m.active ? "🚜" : "⚙️"}</div>)}
            {state.burns.map(b => <div key={b.id} className="pointer-events-none select-none absolute z-10 rounded-full bg-orange-500/35 blur-sm" style={{ left: (b.col - b.radius) * CELL_W, top: (b.row - b.radius) * CELL_H, width: (b.radius * 2 + 1) * CELL_W, height: (b.radius * 2 + 1) * CELL_H }} />)}

            {state.plants.map(p => {
              const def = plantDefs[p.type];
              const plantAction = p.type === "chomper" && p.cd > 0.2 ? "chew" : p.type === "bonkchoy" && p.spinTime > 0 ? "spin" : p.cd > 0.05 ? "attack" : "idle";
              const chewingPct = p.type === "chomper" && p.cd > 0.2 ? clamp((p.cd / Math.max(0.1, p.chewMax || p.cd)) * 100, 0, 100) : 0;
              const spinPct = p.type === "bonkchoy" && p.spinTime > 0 ? clamp((p.spinTime / 3) * 100, 0, 100) : 0;
              return (
                <div key={p.id} className="pointer-events-none select-none absolute z-30 flex flex-col items-center justify-center" style={{ left: p.col * CELL_W + 6, top: p.row * CELL_H + 4, width: CELL_W - 12, height: CELL_H - 8 }}>
                  <PlantSprite type={p.type} action={plantAction} />
                  <div className="h-1.5 w-12 overflow-hidden rounded-full bg-black/40"><div className="h-full bg-lime-300" style={{ width: `${healthPct(p)}%` }} /></div>
                  {chewingPct > 0 && <div className="mt-0.5 h-1.5 w-12 overflow-hidden rounded-full bg-black/45" title="Chewing"><div className="h-full bg-purple-300" style={{ width: `${chewingPct}%` }} /></div>}
                  {spinPct > 0 && <div className="mt-0.5 h-1.5 w-12 overflow-hidden rounded-full bg-black/45" title="Choynado"><div className="h-full bg-yellow-300" style={{ width: `${spinPct}%` }} /></div>}
                </div>
              );
            })}

            {state.projectiles.map(pr => <div key={pr.id} className="pointer-events-none select-none absolute z-40 text-lg" style={{ left: pr.x, top: pr.y }}>{pr.source === "cabbagepult" ? "🥬" : pr.source === "cactus" ? "•" : pr.source === "sunflower" ? "☀️" : "🟢"}</div>)}
            {(state.allies || []).map(a => <div key={a.id} className="pointer-events-none select-none absolute z-45 flex flex-col items-center" style={{ left: a.x, top: a.row * CELL_H + 14 }}><AllySprite ally={a} /><div className="h-1 w-10 overflow-hidden rounded-full bg-black/40"><div className="h-full bg-lime-200" style={{ width: `${healthPct(a)}%` }} /></div></div>)}
            {(state.suns || []).map(orb => <button key={orb.id} onMouseEnter={() => collectSun(orb.id)} className="absolute z-[75] text-2xl drop-shadow-lg transition hover:scale-125" style={{ left: orb.x, top: orb.y }} title={`Collect ${orb.amount} sun`}>☀️</button>)}

            {state.zombies.map(z => {
              const def = zombieDefs[z.type];
              const zombieAction = z.eatCd > 0 ? "eat" : "walk";
              const noSmash = !!state.zombieMods[z.type]?.noSmash;
              return (
                <div key={z.id} className="pointer-events-none select-none absolute z-50 flex flex-col items-center" style={{ left: z.x, top: z.row * CELL_H + (z.flying ? 0 : 12), transform: z.flying ? "translateY(-8px)" : "none" }}>
                  <ZombieSprite type={z.type} hpPct={healthPct(z)} action={zombieAction} noSmash={noSmash} flying={z.flying} groundedAir={z.groundedAir} />
                  <div className="h-1.5 w-14 overflow-hidden rounded-full bg-black/45"><div className="h-full bg-red-400" style={{ width: `${healthPct(z)}%` }} /></div>
                  {z.slow > 0 && <div className="text-[10px]">slow</div>}
                </div>
              );
            })}

            <AnimatePresence>{state.floaties.map(f => <motion.div key={f.id} initial={{ opacity: 0, scale: 0.8 }} animate={{ opacity: 1, scale: 1 }} exit={{ opacity: 0 }} className="pointer-events-none select-none absolute z-[80] font-black text-yellow-200" style={{ left: f.x, top: f.y }}>{f.text}</motion.div>)}</AnimatePresence>
            {state.gameOver && <Overlay title="Game Over" subtitle={`You scored ${state.score} rogue points and picked ${state.buffCount} buffs.`} action={restart} actionText="Play Again" />}
            {!state.running && !state.gameOver && <Overlay title="Paused" subtitle="Press Resume to continue." action={() => setState(s => ({ ...s, running: true }))} actionText="Resume" />}
          </div>

          <Card className="w-[190px] shrink-0 rounded-xl border-white/15 bg-white/10 text-white shadow-xl">
            <CardContent className="space-y-2 p-2">
              <div className="text-sm font-bold">Run Log</div>
              <div className="space-y-1 text-xs">
                <div>Score: <b>{state.score}</b></div>
                <div>Debuffs: <b>{state.debuffsUnlocked ? "Unlocked" : "Locked"}</b></div>
                <div>Unlocked zombies: <b>{Object.values(zombieDefs).filter(z => z.unlock <= state.buffCount).length}/6</b></div>
                <div>Mower recharge: <b>{state.mowerRecharge == null ? "off" : `${state.mowerRecharge}s`}</b></div>
                <div>Max buffed: <b>{maxedPlants.length ? maxedPlants.map(p => plantDefs[p].name).join(", ") : "none"}</b></div>
                <div>Loadout: <b>{(state.seedLoadout||[]).length}/{state.seedSlots}</b> · Swaps: <b>{state.midgameSwaps||0}</b></div>
              </div>
              <div className="flex items-center justify-between gap-1 pt-1"><div className="text-sm font-bold">All Buffs</div><Button onClick={copyBuffs} variant="secondary" className="h-6 rounded-md px-1.5 text-[9px]">Copy</Button></div>
              {copyNote && <div className={`text-[9px] ${copyNote === "Copied!" ? "text-yellow-200" : "text-red-200"}`}>{copyNote}</div>}
              <div className="max-h-[210px] space-y-1 overflow-auto pr-1">
                {state.buffLog.length === 0 && <div className="text-sm text-lime-100/70">No buffs yet.</div>}
                {state.buffLog.map((b, i) => <div key={`${b.name}_${i}`} className={`rounded-lg border p-1.5 ${RARITY_STYLES[b.rarity || "Common"]}`}><div className="text-[8px] uppercase tracking-wide text-lime-100/60">{b.rarity || "Common"} · {b.target}</div><div className="text-xs font-bold">{b.name}</div><div className="text-[10px] text-lime-100/75">{b.desc}</div></div>)}
              </div>
            </CardContent>
          </Card>
        </div>
      </div>

      <AnimatePresence>
        {state.pausedForBuff && (
          <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 z-[100] flex items-center justify-center bg-black/70 p-4 backdrop-blur-sm">
            <Card className="w-full max-w-5xl rounded-3xl border-lime-300/30 bg-emerald-950 text-white shadow-2xl">
              <CardContent className="space-y-4 p-5">
                <div className="flex items-start justify-between gap-3">
                  <div>
                    <h2 className="text-2xl font-black">{state.draftMode === "debuff" ? `Pick Zombie Debuff (${state.pendingDebuffDrafts} left)` : state.draftMode === "plantJackpot" ? "Pick Jackpot Plant" : "Pick a Buff"}</h2>
                    <p className="text-sm text-lime-100/75">{state.draftMode === "debuff" ? "Bonus draft from Unlock Zombie Debuffs." : state.draftMode === "plantJackpot" ? "Choose one plant to jackpot. You also get one hidden random plant jackpot." : `Next zombie scale: ${scaling}x → ${(Math.pow(1.2, state.buffCount + 1)).toFixed(2)}x.${state.draftMinRarity ? ` Guaranteed ${state.draftMinRarity}+ choices.` : ""}`}</p>
                    {offerCopyNote && <div className={`mt-1 text-xs ${offerCopyNote === "Copied!" ? "text-yellow-200" : "text-red-200"}`}>{offerCopyNote}</div>}
                  </div>
                  <Button onClick={copyOfferedBuffs} variant="secondary" className="rounded-xl px-3 text-xs">Copy Offered</Button>
                </div>
                <div className={`grid gap-3 ${state.choices.length > 3 ? "md:grid-cols-4" : "md:grid-cols-3"}`}>
                  {state.choices.map((c, idx) => <BuffCard key={`${c.name}_${idx}`} choice={c} idx={idx} state={state} chooseBuff={chooseBuff} locked={buffPickLocked} />)}
                </div>
              </CardContent>
            </Card>
          </motion.div>
        )}
      </AnimatePresence>
    </div>
  );
}

function BuffCard({ choice, idx, state, chooseBuff, locked }) {
  const target = choice.type === "plant" || choice.type === "plantJackpot" ? plantDefs[choice.plant].name : choice.type === "debuff" ? "Zombie Debuff" : "Global";
  return (
    <button disabled={locked} onClick={() => chooseBuff(choice)} className={`rounded-3xl border p-4 text-left transition ${locked ? "cursor-not-allowed opacity-60" : "hover:scale-[1.02]"} ${RARITY_STYLES[choice.rarity || "Common"]}`}>
      <div className="text-xs uppercase tracking-widest text-lime-100/60">{choice.rarity || "Common"} · {target}</div>
      <div className="mt-1 text-xl font-black">{choice.name}</div>
      <div className="mt-2 text-sm text-lime-100/80">{choice.desc}</div>
      <div className="mt-3 whitespace-pre-line rounded-xl bg-black/25 p-2 text-xs text-lime-100/85">{buffPreview(choice, state)}</div>
      {state.debuffsUnlocked && state.draftMode !== "debuff" && idx === state.choices.length - 1 && <div className="mt-3 text-xs font-bold text-red-200">Right slot debuff</div>}
    </button>
  );
}

function Badge({ children }) {
  return <div className="rounded-lg border border-white/10 bg-black/25 px-2 py-1 font-bold">{children}</div>;
}

function Overlay({ title, subtitle, action, actionText }) {
  return (
    <div className="absolute inset-0 z-[90] flex items-center justify-center bg-black/65 backdrop-blur-sm">
      <div className="max-w-sm rounded-3xl border border-lime-300/30 bg-emerald-950 p-6 text-center shadow-2xl">
        <div className="text-3xl font-black">{title}</div>
        <div className="mt-2 text-sm text-lime-100/75">{subtitle}</div>
        <Button onClick={action} className="mt-4 rounded-2xl">{actionText}</Button>
      </div>
    </div>
  );
}

function Button({ children, className = "", variant = "default", ...props }) {
  const variantCls = variant === "secondary" ? "bg-white/20 hover:bg-white/30" : "bg-lime-300 text-green-950 hover:bg-lime-200";
  return <button className={`border border-white/15 px-2 py-1 font-semibold ${variantCls} ${className}`} {...props}>{children}</button>;
}

function Card({ children, className = "" }) {
  return <div className={className}>{children}</div>;
}

function CardContent({ children, className = "" }) {
  return <div className={className}>{children}</div>;
}

const mount = document.getElementById("root");
if (mount) createRoot(mount).render(<PvZRoguePrototype />);

</script></body></html>
